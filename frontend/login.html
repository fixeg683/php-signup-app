<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="signup-container">
        <h2>Account Login</h2>
        <div id="messageBox" class="alert hidden"></div>
        
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" autocomplete="email" required>
                <span class="error-msg" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password" required>
                <span class="error-msg" id="passwordError"></span>
            </div>

            <button type="submit" id="submitBtn">Sign In</button>
        </form>
        <p style="margin-top: 1.25rem; text-align: center; font-size: 0.9rem;">
            Don't have an account? <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">Sign up here</a>
        </p>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
