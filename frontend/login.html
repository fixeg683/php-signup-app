<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="signup-container">
        <h2>Account Login</h2>
        <div id="messageBox" class="alert hidden"></div>
        
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required>
                <span class="error-msg" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
                <span class="error-msg" id="passwordError"></span>
            </div>

            <button type="submit" id="submitBtn">Sign In</button>
        </form>
        <p style="margin-top:1rem; text-align:center; font-size:0.9rem;">
            Don't have an account? <a href="index.html">Sign up here</a>
        </p>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const msgBox = document.getElementById('messageBox');
            msgBox.className = 'alert hidden';
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('https://api.yourdomain.com/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    msgBox.className = 'alert alert-success';
                    msgBox.innerText = 'Login successful! Redirecting...';
                    // Store safe user context references locally if desired
                    localStorage.setItem('user_session', JSON.stringify(result.user));
                } else {
                    msgBox.className = 'alert alert-danger';
                    msgBox.innerText = result.error || 'Invalid credentials.';
                }
            } catch (err) {
                msgBox.className = 'alert alert-danger';
                msgBox.innerText = 'Network connection failure.';
            }
        });
    </script>
</body>
</html>
